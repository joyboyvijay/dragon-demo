---
- name: Zip index.html into index.zip (local on Jenkins)
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    src_dir: "{{ lookup('env','WORK_DIR') | default('.', true) }}"
    src_file: "index.html"
    zip_name: "index.zip"

  tasks:
    - name: Ensure index.html exists
      ansible.builtin.stat:
        path: "{{ src_dir }}/{{ src_file }}"
      register: html_stat

    - name: Fail if index.html not found
      ansible.builtin.fail:
        msg: "index.html not found at {{ src_dir }}"
      when: not html_stat.stat.exists

    - name: Create ZIP from index.html
      ansible.builtin.archive:
        path: "{{ src_dir }}/{{ src_file }}"
        dest: "{{ src_dir }}/{{ zip_name }}"
        format: zip
        force_archive: true
